<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>PASSWORD</title>

<style>

body{
font-family: Arial;
margin:0;
background:#111;
color:white;
}

.login{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#111;
}

input{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:lime;
font-weight:bold;
cursor:pointer;
}

.link{
display:none;
margin-top:20px;
padding:10px 20px;
background:lime;
color:black;
text-decoration:none;
border-radius:6px;
}

.site{
display:none;
padding:40px;
text-align:center;
}

.error{
color:red;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="login">

<h2>Ingresa la contraseña</h2>

<input id="pass" type="password" placeholder="contraseña">

<button onclick="check()">Entrar</button>

<p class="error" id="error">Contraseña incorrecta</p>

<a class="link" id="link" href="./page.html">Entrar al sitio</a>

<div class="site" id="site">

<h1>Pista- es un tipo de cifrado</h1>

<p>
TEWWASVH
</p>

<p>
Espero que te guste 
</p>

</div>

</div>

<script>

function check(){

let password = "password"; // CAMBIA AQUÍ LA CONTRASEÑA
let input = document.getElementById("pass").value;

if(input === password){

document.getElementById("link").style.display = "inline-block";
document.getElementById("site").style.display = "block";
document.getElementById("error").style.display = "none";

}else{

document.getElementById("error").style.display = "block";

}

}

</script>

</body>
</html>
