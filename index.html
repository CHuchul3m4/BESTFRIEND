<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
  <h2>Ingresa la contraseña</h2>
  <input id="pass" type="password" placeholder="contraseña">
  <button onclick="check()">Entrar</button>
  <p id="error" style="color:red; display:none;">Contraseña incorrecta</p>

  <script>
    function check() {
      const correcta = "password"; // cambia aquí tu contraseña
      const escrita = document.getElementById("pass").value;

      if (escrita === correcta) {
        localStorage.setItem("auth", "ok");
        window.location.href = "page.html"; // redirige si es correcta
      } else {
        const errorMsg = document.getElementById("error");
        errorMsg.style.display = "block"; // muestra mensaje de error
      }
    }
  </script>
</body>
</html>
